<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IMC Calculator</title>
    </head>
    <body>
        <div class="app">
            <!--Estructura de la aplicacion aqui -->

            <h1>Caluladora IMC</h1>

            <form id="imcForm">
                <div class="form-group">
                    <label for="Peso">Peso (kg)</label>
                    <input 
                        type="number"
                        id="peso"
                        name="peso"
                        step="0.1"
                        placeholder="Ingresa Tu Peso"
                        required
                        />
                </div>

                <div class="form-group">
                    <label for="altura">Altura (m)</label>
                    <input
                        type="number"
                        id="altura"
                        name="altura"
                        step="0.01"
                        placeholder="Ingresa Tu Altura"
                        required
                        />
                </div>

                <button type="submit">Calcular</button>
            </form>

        <div class="Resultado">
            <h2>Resultado</h2>
            <p id="ValorIMC"></p>
            <p id="ClasificacionIMC"></p>
            
            
        </div>
    </body>
</html>
